environments:
  dev:
    project: bq-dataworkeragent-test
    region: us-central1
    resources:
      - type: bigquery.dataset
        name: salesforce_raw
        definition:
          location: '{{ region }}'
          labels:
            env: dev

      - type: bigquerydatatransfer.transferConfig
        name: salesforce_contract_ingestion
        definition:
          displayName: "Salesforce Contract Ingestion"
          dataSourceId: salesforce
          schedule: "every 24 hours"
          destinationDatasetId: salesforce_raw
          params:
            connector.authentication.oauth.clientId: _DEPLOY_VAR_CLIENT_ID
            connector.authentication.oauth.clientSecret: _DEPLOY_VAR_CLIENT_SECRET
            connector.authentication.oauth.myDomain: _DEPLOY_VAR_MY_DOMAIN
            assets: '["Contract"]'
