environments:
  dev:
    project: bq-dataworkeragent-test
    region: us-central1
    variables:
      project: bq-dataworkeragent-test
      region: us-central1
    resources:
      # --- BigQuery ---
      - type: bigquery.dataset
        name: salesforce_ingest
        definition:
          location: "{{ region }}"
          labels:
            env: dev

      - type: bigquerydatatransfer.transferConfig
        name: salesforce_contract_dts
        definition:
          displayName: "Salesforce Contract Transfer"
          dataSourceId: salesforce
          schedule: "every 24 hours"
          destinationDatasetId: salesforce_ingest
          params:
            connector.authentication.oauth.clientId: "{{ SALESFORCE_CLIENT_ID }}"
            connector.authentication.oauth.clientSecret: "{{ SALESFORCE_CLIENT_SECRET }}"
            connector.authentication.oauth.myDomain: "{{ SALESFORCE_MY_DOMAIN }}"
            assets:
              - "Contract"

      # --- Dataform ---
      - type: dataform.repository
        name: salesforce_dbt_repo
        definition:
          labels:
            env: dev

      - type: dataform.repository.releaseConfig
        name: my-release-config
        parent: salesforce_dbt_repo
        definition:
          gitCommitish: "main"
          codeCompilationConfig:
            defaultDatabase: "{{ project }}"

      - type: dataform.repository.workflowConfig
        name: my-workflow-config
        parent: salesforce_dbt_repo
        definition:
          releaseConfig: "projects/{{ project }}/locations/{{ region }}/repositories/salesforce_dbt_repo/releaseConfigs/my-release-config"
          invocationConfig:
            serviceAccount: "dataform-sa@{{ project }}.iam.gserviceaccount.com"
          cronSchedule: "0 0 * * *"
          timeZone: "America/Los_Angeles"
