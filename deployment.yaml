environments:
  dev:
    project: bq-dataworkeragent-test
    region: us-central1
    variables:
      project: bq-dataworkeragent-test
      region: us-central1
    secrets:
      SALESFORCE_CLIENT_ID: "projects/{{ project }}/secrets/SALESFORCE_CLIENT_ID/versions/latest"
      SALESFORCE_CLIENT_SECRET: "projects/{{ project }}/secrets/SALESFORCE_CLIENT_SECRET/versions/latest"
      SALESFORCE_MY_DOMAIN: "projects/{{ project }}/secrets/SALESFORCE_MY_DOMAIN/versions/latest"
    resources:
      # --- BigQuery Data Transfer Service ---
      - type: bigquerydatatransfer.transferConfig
        name: salesforce_ingestion
        definition:
          displayName: "Salesforce Contract Ingestion"
          dataSourceId: salesforce
          schedule: "every 24 hours"
          destinationDatasetId: salesforce_ingest
          params:
            connector.authentication.oauth.clientId: "{{ SALESFORCE_CLIENT_ID }}"
            connector.authentication.oauth.clientSecret: "{{ SALESFORCE_CLIENT_SECRET }}"
            connector.authentication.oauth.myDomain: "{{ SALESFORCE_MY_DOMAIN }}"
            assets: ["Contract"]

      # --- Dataform ---
      - type: dataform.repository
        name: salesforce_dbt_repo
        definition:
          labels:
            env: dev
      - type: dataform.repository.releaseConfig
        name: salesforce_release
        parent: salesforce_dbt_repo
        definition:
          gitCommitish: "main"
          codeCompilationConfig:
            defaultDatabase: "{{ project }}"
      - type: dataform.repository.workflowConfig
        name: salesforce_workflow
        parent: salesforce_dbt_repo
        definition:
          releaseConfig: "projects/{{ project }}/locations/{{ region }}/repositories/salesforce_dbt_repo/releaseConfigs/salesforce_release"
          invocationConfig:
            transitiveDependenciesIncluded: true
          cronSchedule: "0 0 * * *"
          timeZone: "America/Los_Angeles"
